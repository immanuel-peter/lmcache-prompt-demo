services:
  skills-proxy:
    build:
      context: ./skills-proxy
    environment:
      VERCEL_TOKEN: ${VERCEL_TOKEN:-}
      VERCEL_ORG_ID: ${VERCEL_ORG_ID:-}
      VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID:-}
    ports:
      - "${SKILLS_PROXY_PORT:-8787}:8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ./backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      LMCACHE_KV_SERVICE_URL: ${LMCACHE_KV_SERVICE_URL:-}
      LMCACHE_CONTROLLER_URL: ${LMCACHE_CONTROLLER_URL:-}
      LMCACHE_RUNTIME_URL: ${LMCACHE_RUNTIME_URL:-}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      LMCACHE_INSTANCE_ID: ${LMCACHE_INSTANCE_ID:-lmcache_default_instance}
      DEMO_TENANT_ID: ${DEMO_TENANT_ID:-demo-tenant}
      SQLITE_PATH: /data/catalog.sqlite3
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SKILLS_PROXY_URL: ${SKILLS_PROXY_URL:-http://skills-proxy:8787}
      # Browser-facing Open WebUI URL, surfaced to the frontend via /api/connectivity.
      # Defaults to the same host port used in the openwebui mapping below, so
      # OPENWEBUI_PORT is the single knob; override OPENWEBUI_URL for non-local hosts.
      OPENWEBUI_URL: ${OPENWEBUI_URL:-http://localhost:${OPENWEBUI_PORT:-8080}}
    volumes:
      - api-data:/data
    depends_on:
      skills-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: ./frontend
    environment:
      # Runtime-resolved: Next.js SSR proxies /api/* to the internal api service.
      BACKEND_URL: ${BACKEND_URL:-http://api:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  openwebui:
    image: openwebui/open-webui:latest
    ports:
      - "${OPENWEBUI_PORT:-8080}:8080"
    environment:
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      OPENAI_API_KEY: ${VLLM_API_KEY:-demo-key}
      WEBUI_NAME: LMCache Prompt Demo
      ENABLE_SIGNUP: "false"
      ENABLE_OLLAMA_API: "false"
      HF_HUB_OFFLINE: "1"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      RAG_RERANKING_MODEL_AUTO_UPDATE: "false"
      ENABLE_MEMORIES: "false"
      USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS: "false"
      USER_PERMISSIONS_FEATURES_MEMORIES: "false"
    volumes:
      - openwebui-data:/app/backend/data

volumes:
  api-data:
  openwebui-data:
