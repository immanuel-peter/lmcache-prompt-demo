version: "1.0"
name: lmcache-demo
description: LMCache prompt registry demo

services:
  frontend:
    type: nextjs
    build:
      source: ./frontend
    env:
      # Server-side only, resolved at runtime. The Next.js server proxies /api/*
      # to this internal URL (see frontend/next.config.ts), so the browser never
      # talks to the API directly and the API needs no public/external URL.
      BACKEND_URL: ${api.url}
    depends_on:
      - api

  skills-proxy:
    type: custom
    build:
      source: ./skills-proxy
    ports: [8787]
    health:
      http: /health
    env:
      VERCEL_TOKEN: ${secret:VERCEL_TOKEN}
      VERCEL_ORG_ID: ${secret:VERCEL_ORG_ID}
      VERCEL_PROJECT_ID: ${secret:VERCEL_PROJECT_ID}

  api:
    type: custom
    build:
      source: ./backend
    ports: [8000]
    health:
      http: /health
    persistence:
      mount: /data
      size: 1Gi
    depends_on:
      - skills-proxy
    env:
      # Leave empty to use built-in demo catalog; set to proxy a live LMCache KV service.
      LMCACHE_KV_SERVICE_URL: ${secret:LMCACHE_KV_SERVICE_URL}
      # LMCache controller API (token-level pin/evict/move).
      LMCACHE_CONTROLLER_URL: ${secret:LMCACHE_CONTROLLER_URL}
      # LMCache MP HTTP server (runtime events).
      LMCACHE_RUNTIME_URL: ""
      # vLLM OpenAI-compatible API for Open WebUI.
      VLLM_BASE_URL: ${secret:VLLM_BASE_URL}
      LMCACHE_INSTANCE_ID: lmcache_default_instance
      DEMO_TENANT_ID: demo-tenant
      SQLITE_PATH: /data/catalog.sqlite3
      CORS_ORIGINS: "*"
      SKILLS_PROXY_URL: ${skills-proxy.url}
      # Browser-facing link to Open WebUI, surfaced to the frontend via
      # /api/connectivity so it resolves at runtime (public URL the browser opens).
      OPENWEBUI_URL: ${openwebui.external_url}

  openwebui:
    type: custom
    image: openwebui/open-webui:latest
    public: true
    ports: [8080]
    health:
      http: /health
    env:
      OPENAI_API_BASE_URL: ${secret:OPENAI_API_BASE_URL}
      OPENAI_API_KEY: ${secret:OPENAI_API_KEY}
      WEBUI_NAME: LMCache Prompt Demo
      ENABLE_SIGNUP: "false"
      DEFAULT_MODELS: meta-llama/Llama-3.1-8B-Instruct

      # No local Ollama
      ENABLE_OLLAMA_API: "false"

      # Block HuggingFace embedding/reranker downloads
      HF_HUB_OFFLINE: "1"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      RAG_RERANKING_MODEL_AUTO_UPDATE: "false"

      # Disable RAG-adjacent features
      ENABLE_MEMORIES: "false"

      # Hide RAG UI for users
      USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS: "false"
      USER_PERMISSIONS_FEATURES_MEMORIES: "false"
